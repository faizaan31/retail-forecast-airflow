# Local stack: Airflow 3.1 (api-server + scheduler) + StatsForecast training + FastAPI inference.
# Override secrets via a root `.env` file or shell env; defaults are for local demos only.

services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile
    image: retail-forecast-airflow:3.1.0
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      &airflow_common_env
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      AIRFLOW__CORE__ENABLE_XCOM_PICKLING: "True"
      AIRFLOW__CORE__DAGBAG_IMPORT_TIMEOUT: "120"
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://api-server:8080/execution/
      PYTHONPATH: /opt/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY:-Srp2BKpnQvQgd2d_yB2B-qVC8RHWUgmKrgYeQMzhx8I=}
      AIRFLOW__CORE__EXECUTION_API_JWT_SECRET_KEY: ${AIRFLOW__CORE__EXECUTION_API_JWT_SECRET_KEY:-local-demo-jwt-secret-change-before-any-shared-deploy-please}
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        until pg_isready -h postgres -U airflow -d airflow; do sleep 2; done
        airflow db migrate
        if ! airflow users list 2>/dev/null | grep -q admin; then
          airflow users create \
            --username admin --firstname Admin --lastname User \
            --role Admin --email admin@localhost --password admin
        fi
    volumes:
      - ./dags:/opt/airflow/dags
      - ./ml_pipeline:/opt/airflow/ml_pipeline
      - ./plugins:/opt/airflow/plugins
      - ./data:/opt/airflow/data
      - pipeline_models:/opt/airflow/models
      - pipeline_outputs:/opt/airflow/outputs
      - pipeline_logs:/opt/airflow/logs
    restart: on-failure

  api-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: retail-forecast-airflow:3.1.0
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8081:8080"
    environment:
      <<: *airflow_common_env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./ml_pipeline:/opt/airflow/ml_pipeline
      - ./plugins:/opt/airflow/plugins
      - ./data:/opt/airflow/data
      - pipeline_models:/opt/airflow/models
      - pipeline_outputs:/opt/airflow/outputs
      - pipeline_logs:/opt/airflow/logs
    command: api-server
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    image: retail-forecast-airflow:3.1.0
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      <<: *airflow_common_env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./ml_pipeline:/opt/airflow/ml_pipeline
      - ./plugins:/opt/airflow/plugins
      - ./data:/opt/airflow/data
      - pipeline_models:/opt/airflow/models
      - pipeline_outputs:/opt/airflow/outputs
      - pipeline_logs:/opt/airflow/logs
    command: scheduler
    restart: unless-stopped

  forecast-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ./ml_pipeline:/app/ml_pipeline
      - pipeline_models:/opt/airflow/models
      - pipeline_outputs:/opt/airflow/outputs
    environment:
      PYTHONPATH: /app
    depends_on:
      - scheduler
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./dashboard:/app
      - pipeline_outputs:/opt/airflow/outputs
      - pipeline_models:/opt/airflow/models
    depends_on:
      - forecast-api
    restart: unless-stopped

volumes:
  postgres_data:
  pipeline_models:
  pipeline_outputs:
  pipeline_logs:
